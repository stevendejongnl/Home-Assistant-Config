# =============================================================================
# Custom Sidebar Panels
# Shortcuts to built-in configuration pages exposed as top-level sidebar items.
# =============================================================================

# Devices overview
- name: panel_devices
  sidebar_title: Devices
  sidebar_icon: mdi:devices
  js_url: /api/hassio/app/entrypoint.js
  url_path: "config/devices"
  embed_iframe: true
  require_admin: true
  config:
    ingress: core_configurator

