- id: turn_off_3d_printer_after_idle
  alias: "Turn off 3D printer after 30 minutes idle"
  description: "Turns off the 3D printer switch when not printing for 30 minutes"
  triggers:
    - trigger: state
      entity_id: sensor.voxelab_aquila_current_print_state
      from: printing
      for:
        minutes: 30
  conditions:
    - condition: state
      entity_id: switch.3d_printer
      state: "on"
    - condition: not
      conditions:
        - condition: state
          entity_id: sensor.voxelab_aquila_current_print_state
          state: "paused"
  actions:
    - action: switch.turn_off
      target:
        entity_id: switch.3d_printer
  mode: single
