freddy_room_clean:
  alias: 'Freddy: Room Clean'
  icon: mdi:robot-vacuum
  fields:
    room_ids:
      description: List of room IDs to clean. Use input_number helpers for values.
      example: '[0, 2, 1]'
  sequence:
  - if:
    - condition: state
      entity_id: vacuum.freddy
      state: cleaning
    then:
    - action: vacuum.start
      target:
        entity_id: vacuum.freddy
    - action: vacuum.return_to_base
      target:
        entity_id: vacuum.freddy
    - delay:
        seconds: 5
  - wait_template: '{{ not is_state(''vacuum.freddy'', ''unavailable'') }}'
    timeout:
      seconds: 30
    continue_on_timeout: true
  - repeat:
      while:
      - condition: not
        conditions:
        - condition: state
          entity_id: vacuum.freddy
          state: cleaning
      - condition: template
        value_template: '{{ repeat.index <= 3 }}'
      sequence:
      - action: vacuum.send_command
        target:
          entity_id: vacuum.freddy
        data:
          command: room_clean
          params:
            room_ids: '{{ room_ids }}'
            count: 1
      - delay:
          seconds: 15
  - if:
    - condition: not
      conditions:
      - condition: state
        entity_id: vacuum.freddy
        state: cleaning
    then:
    - action: notify.steven
      data:
        title: Freddy ⚠️
        message: Couldn't start cleaning. In cooldown — retrying in 5 minutes.
    - delay:
        minutes: 5
    - action: vacuum.send_command
      target:
        entity_id: vacuum.freddy
      data:
        command: room_clean
        params:
          room_ids: '{{ room_ids }}'
          count: 1
    - delay:
        seconds: 10
    - if:
      - condition: not
        conditions:
        - condition: state
          entity_id: vacuum.freddy
          state: cleaning
      then:
      - action: vacuum.start
        target:
          entity_id: vacuum.freddy
      - delay:
          seconds: 15
      - action: vacuum.return_to_base
        target:
          entity_id: vacuum.freddy
      - delay:
          minutes: 1
      - action: vacuum.send_command
        target:
          entity_id: vacuum.freddy
        data:
          command: room_clean
          params:
            room_ids: '{{ room_ids }}'
            count: 1
      - delay:
          seconds: 15
      - if:
        - condition: not
          conditions:
          - condition: state
            entity_id: vacuum.freddy
            state: cleaning
        then:
        - action: notify.steven
          data:
            title: Freddy ❌
            message: Kon niet starten na alle pogingen, inclusief herstart. Controleer
              Freddy handmatig.
        - action: notify.anja
          data:
            title: Freddy ❌
            message: Freddy kon niet starten na alle pogingen. Controleer handmatig.
  mode: single
freddy_revalidate_room:
  alias: 'Freddy: Revalidate Room ID'
  icon: mdi:map-marker-check
  fields:
    room_name:
      description: Room to revalidate
      selector:
        select:
          options:
          - label: Kitchen
            value: kitchen
          - label: Living Room
            value: living_room
          - label: Hallway
            value: hallway
          - label: Dining Room
            value: dining_room
    _scanning:
      description: 'Internal: true when scanning IDs sequentially from 0'
      default: false
  sequence:
  - variables:
      room_id: '{{ states(''input_number.freddy_room_id_'' + room_name) | int }}'
      room_label: "{{ {'kitchen': 'Kitchen', 'living_room': 'Living Room',\n    'hallway':
        'Hallway', 'dining_room': 'Dining Room'}[room_name] }}\n"
  - if:
    - condition: template
      value_template: '{{ room_id > 10 }}'
    then:
    - action: notify.steven
      data:
        title: Freddy Give Up
        message: Tried IDs 0–10 for {{ room_label }}, none triggered movement. Reset
          helper manually.
    - stop: Exceeded ID scan range
  - action: vacuum.send_command
    target:
      entity_id: vacuum.freddy
    data:
      command: room_clean
      params:
        room_ids: '{{ [room_id] }}'
        count: 1
  - wait_template: '{{ not is_state(''vacuum.freddy'', ''docked'') and not is_state(''vacuum.freddy'',
      ''idle'') }}'
    timeout:
      seconds: 20
    continue_on_timeout: true
  - if:
    - condition: template
      value_template: '{{ not wait.completed }}'
    then:
    - action: input_number.set_value
      target:
        entity_id: input_number.freddy_room_id_{{ room_name }}
      data:
        value: '{{ room_id + 1 if _scanning | default(false) else 0 }}'
    - action: script.freddy_revalidate_room
      data:
        room_name: '{{ room_name }}'
        _scanning: true
    - stop: ID {{ room_id }} was phantom, retrying from {{ room_id + 1 if _scanning
        | default(false) else 0 }}
  - delay:
      minutes: 2
      seconds: 10
  - action: vacuum.pause
    target:
      entity_id: vacuum.freddy
  - action: notify.steven
    data:
      title: Freddy Room Check
      message: 'Sent Freddy to {{ room_label }} (ID {{ room_id }}). Which room is
        it actually in?

        '
      data:
        tag: freddy_room_validate
        persistent: true
        actions:
        - action: FREDDY_VAL_KITCHEN
          title: Kitchen
        - action: FREDDY_VAL_LIVING_ROOM
          title: Living Room
        - action: FREDDY_VAL_HALLWAY
          title: Hallway
        - action: FREDDY_VAL_DINING_ROOM
          title: Dining Room
  - wait_for_trigger:
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: FREDDY_VAL_KITCHEN
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: FREDDY_VAL_LIVING_ROOM
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: FREDDY_VAL_HALLWAY
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: FREDDY_VAL_DINING_ROOM
    timeout:
      minutes: 30
    continue_on_timeout: true
  - if:
    - condition: template
      value_template: '{{ wait.completed }}'
    then:
    - variables:
        action_map:
          FREDDY_VAL_KITCHEN:
            key: kitchen
            label: Kitchen
          FREDDY_VAL_LIVING_ROOM:
            key: living_room
            label: Living Room
          FREDDY_VAL_HALLWAY:
            key: hallway
            label: Hallway
          FREDDY_VAL_DINING_ROOM:
            key: dining_room
            label: Dining Room
        confirmed: '{{ action_map[wait.trigger.event.data.action] }}'
    - action: input_number.set_value
      target:
        entity_id: input_number.freddy_room_id_{{ confirmed.key }}
      data:
        value: '{{ room_id }}'
    - action: notify.steven
      data:
        title: Freddy Mapped
        message: '{{ confirmed.label }} = ID {{ room_id }}. Helper updated.'
    else:
    - action: notify.steven
      data:
        title: Freddy Timed Out
        message: No answer for {{ room_label }} after 30 min. Mapping unchanged.
  - action: vacuum.return_to_base
    target:
      entity_id: vacuum.freddy
  mode: queued
  max: 5
play_radio:
  alias: Play Radio
  icon: mdi:radio
  mode: single
  fields:
    station:
      description: Radio station to play
      required: true
      selector:
        select:
          options:
          - label: Q-music
            value: qmusic
          - label: Q-music Non-Stop
            value: qmusic_nonstop
          - label: Radio 538
            value: radio_538
          - label: Radio 538 Non-Stop
            value: radio_538_nonstop
          - label: SLAM!
            value: slam
          - label: SLAM! Non-Stop
            value: slam_nonstop
    target_players:
      description: 'List of Volumio media player entities (default: both rooms)'
      example: '[media_player.living_room, media_player.dining_room]'
      selector:
        entity:
          domain: media_player
          multiple: true
  sequence:
  - variables:
      stations:
        qmusic:
          stream_url: http://opml.radiotime.com/Tune.ashx?id=s87683
          title: Qmusic
          thumbnail: /local/radio/qmusic.png
        qmusic_nonstop:
          stream_url: http://opml.radiotime.com/Tune.ashx?id=s210431
          title: Qmusic Nonstop
          thumbnail: /local/radio/qmusic-nonstop.png
        radio_538:
          stream_url: http://opml.radiotime.com/Tune.ashx?id=s346477
          title: Radio 538 Netherland
          thumbnail: /local/radio/538.png
        radio_538_nonstop:
          stream_url: http://opml.radiotime.com/Tune.ashx?id=s252020
          title: 538 Non-Stop
          thumbnail: /local/radio/538-nonstop.png
        slam:
          stream_url: http://opml.radiotime.com/Tune.ashx?id=s67814
          title: SLAM!
          thumbnail: /local/radio/slam.png
        slam_nonstop:
          stream_url: http://opml.radiotime.com/Tune.ashx?id=s253879
          title: SLAM! Non Stop
          thumbnail: /local/radio/slam-nonstop.png
      players: "{{ target_players if target_players is defined and target_players\n
        \  else ['media_player.living_room', 'media_player.dining_room'] }}\n"
      info: '{{ stations[station] }}'
  - action: media_player.play_media
    target:
      entity_id: '{{ players }}'
    data:
      media_content_id: '{"service": "webradio", "type": "webradio", "title": "{{
        info.title }}", "artist": "", "albumart": "", "uri": "{{ info.stream_url }}"}'
      media_content_type: music
