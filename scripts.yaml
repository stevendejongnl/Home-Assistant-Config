toggle_scott_door_alarm:
  alias: Toggle Scott door alarm
  sequence:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.reset_bedroom_scott_delay
  - if:
    - condition: state
      entity_id: input_boolean.bedroom_scott_alarm_mute
      state:
      - 'on'
    then:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.bedroom_scott_alarm_mute
    - action: notify.steven
      data:
        message: Alarm activated
        title: Bedroom Scott
    else:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.bedroom_scott_alarm_mute
    - action: notify.steven
      data:
        message: Alarm muted
        title: Bedroom Scott
  mode: single
bedroom_scott_notify_wait:
  alias: Bedroom Scott notify + wait
  sequence:
  - if:
    - condition: or
      conditions:
      - alias: Check night hours
        condition: or
        conditions:
        - condition: and
          conditions:
          - condition: time
            after: input_datetime.bedroom_scott_alarm_night_start
          - condition: time
            before: '23:59:59'
          alias: Check alarm evening
        - condition: and
          conditions:
          - condition: time
            after: 00:00:00
          - condition: time
            before: input_datetime.bedroom_scott_alarm_night_end
          alias: Check alarm night
      - condition: and
        conditions:
        - condition: time
          weekday:
          - wed
          - fri
          - sat
          - sun
        - condition: time
          after: input_datetime.bedroom_scott_alarm_day_start
        - condition: time
          before: input_datetime.bedroom_scott_alarm_day_end
        alias: Check afternoon on specific days
    then:
    - data:
        filename: /config/www/snapshots/bedroom_scott_last_person.jpg
      target:
        entity_id: image.scott01_person
      action: image.snapshot
    - if:
      - condition: state
        entity_id: person.steven_de_jong
        state: home
      then:
      - data:
          title: Bedroom Scott
          message: The door is open!
          data:
            image: https://ha.madebysteven.nl/local/snapshots/bedroom_scott_last_person.jpg?v={{
              ((state_attr('automation.bedroom_scott_door_notify_toggle', 'last_triggered')
              or now()) | as_datetime).timestamp() | int }}
            push:
              interruption-level: critical
        action: notify.steven
    - if:
      - condition: state
        entity_id: person.anja
        state: home
      then:
      - data:
          title: Bedroom Scott
          message: The door is open!
          data:
            image: https://ha.madebysteven.nl/local/snapshots/bedroom_scott_last_person.jpg?v={{
              ((state_attr('automation.bedroom_scott_door_notify_toggle', 'last_triggered')
              or now()) | as_datetime).timestamp() | int }}
            push:
              interruption-level: '{{ ''critical'' if states(''person.steven_de_jong'')
                != ''home'' else ''active'' }}'
        action: notify.anja
  - delay:
      hours: 0
      minutes: 5
      seconds: 0
      milliseconds: 0
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.bedroom_scott_door_alarm
  mode: single
send_todo_notification:
  alias: Send Todo Notification
  sequence:
  - data:
      title: "\U0001F4CB Daily Todo Reminder"
      message: '{{ todo_item }}'
      data:
        actions:
        - action: COMPLETE_TODO
          title: ✓ Mark Complete
        - action: SKIP_TODO
          title: Skip
        tag: todo_{{ todo_item | regex_replace('[^a-zA-Z0-9]', '_') }}
        data:
          todo_item: '{{ todo_item }}'
    action: notify.steven
  - data:
      title: "\U0001F4CB Daily Todo Reminder"
      message: '{{ todo_item }}'
      data:
        actions:
        - action: COMPLETE_TODO
          title: ✓ Mark Complete
        - action: SKIP_TODO
          title: Skip
        tag: todo_{{ todo_item | regex_replace('[^a-zA-Z0-9]', '_') }}
        data:
          todo_item: '{{ todo_item }}'
    action: notify.anja
  mode: parallel
  fields:
    todo_item:
      description: The todo item text
      selector:
        text:
