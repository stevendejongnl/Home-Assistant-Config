    # --- Washing machine top 3 (non-overlapping, within 12h) ---
    - name: "Washing Machine Top 3 Times Text"
      unique_id: washing_machine_top_3_times_text
      state: >
        {% set slots = state_attr('sensor.best_time_slots_washing_machine', 'slots') %}
        {% set needed_hours = states('input_number.slots_needed_washing_machine') | float %}
        {% set now_dt = now() %}
        {% set cutoff_ts = as_timestamp(now_dt) + 12 * 3600 %}
        {% set today_slots = slots['today'] if slots and slots['today'] else [] %}
        {% set tomorrow_slots = slots['tomorrow'] if slots and slots['tomorrow'] else [] %}
        {% set all_slots = (today_slots + tomorrow_slots) | sort(attribute='average') %}
        {% set ns = namespace(parts=[], selected=[]) %}
        {% for slot in all_slots %}
          {% if ns.parts | length < 3 %}
            {% set start_ts = as_timestamp(slot['start'] | as_datetime) %}
            {% set end_ts = as_timestamp(slot['end'] | as_datetime) %}
            {% if start_ts <= cutoff_ts %}
              {% set ov = namespace(found=false) %}
              {% for sel in ns.selected %}
                {% if start_ts < sel[1] and end_ts > sel[0] %}{% set ov.found = true %}{% endif %}
              {% endfor %}
              {% if not ov.found %}
                {% set start = slot['start'] | as_datetime | as_local %}
                {% set end = slot['end'] | as_datetime | as_local %}
                {% set cost = (slot['average'] * needed_hours) | round(2) %}
                {% set hours_until = ((end_ts - as_timestamp(now_dt)) / 3600) | round(0, 'ceil') | int %}
                {% set countdown = '(nu klaar)' if hours_until <= 0 else '(klaar in ' ~ hours_until ~ 'u)' %}
                {% set entry = start.strftime('%a') ~ ' ' ~ start.strftime('%H:%M') ~ '-' ~ end.strftime('%H:%M') ~ ' €' ~ ('%.2f' % cost) ~ ' ' ~ countdown %}
                {% set ns.parts = ns.parts + [entry] %}
                {% set ns.selected = ns.selected + [[start_ts, end_ts]] %}
              {% endif %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.parts | join(', ') if ns.parts else 'No slots available' }}

