# =============================================================================
# Template Sensors — Appliance Scheduling (NordPool)
#
# Each sensor finds the cheapest contiguous block of hourly NordPool slots for
# a given appliance.  The algorithm works as follows:
#
#   1. Retrieve today's and tomorrow's hourly price data from the NordPool
#      sensor (raw_today / raw_tomorrow attributes).
#   2. Filter out hours that have already passed.
#   3. Slide a window of size "slots_needed" (from the corresponding
#      input_number helper) across the remaining hours.
#   4. For each window position, compute the average energy price.
#   5. Sort windows by average price (ascending) so the cheapest window is first.
#   6. Expose the sorted list as a JSON attribute ("slots") with separate
#      "today" and "tomorrow" arrays.
#
# Automations / dashboards can then read the first element of
# sensor.<name>.attributes.slots.today to get the optimal start time.
# =============================================================================

- sensor:
    # --- Washing machine ---
    - name: "Best Time Slots Washing Machine"
      unique_id: best_time_slots_washing_machine
      state: "{{ states('sensor.nordpool_kwh_nl_eur_3_10_021') }}"
      attributes:
        slots: >
          {% set slots_needed = (states('input_number.slots_needed_washing_machine') | float * 4) | int %}
          {% set slots_needed = slots_needed if slots_needed > 0 else 1 %}
          {% set raw_today = state_attr('sensor.nordpool_kwh_nl_eur_3_10_021', 'raw_today') %}
          {% set raw_tomorrow = state_attr('sensor.nordpool_kwh_nl_eur_3_10_021', 'raw_tomorrow') %}
          {% set now = now() %}

          {% set combined_raw = namespace(today=[], tomorrow=[]) %}
          {% if raw_today %}
            {% set today_filtered = raw_today | selectattr('start', '>=', now | as_datetime) | list %}
            {% set combined_raw.today = today_filtered %}
          {% endif %}
          {% if raw_tomorrow %}
            {% set tomorrow_filtered = raw_tomorrow | selectattr('start', '>=', now | as_datetime) | list %}
            {% set combined_raw.tomorrow = tomorrow_filtered %}
          {% endif %}

          {% set slotted = namespace(today=[], tomorrow=[]) %}
          {% for i in range(0, combined_raw.today | length - slots_needed + 1) %}
            {% set window = combined_raw.today[i:i+slots_needed] %}
            {% set avg_price = (window | map(attribute='value') | sum) / slots_needed %}
            {% set start_time = window[0].start.strftime('%Y-%m-%dT%H:%M:%S%z') %}
            {% set end_time = window[slots_needed - 1].end.strftime('%Y-%m-%dT%H:%M:%S%z') %}
            {% set slotted.today = slotted.today + [{'start': start_time, 'end': end_time, 'average': avg_price}] %}
          {% endfor %}
          {% for i in range(0, combined_raw.tomorrow | length - slots_needed + 1) %}
            {% set window = combined_raw.tomorrow[i:i+slots_needed] %}
            {% set avg_price = (window | map(attribute='value') | sum) / slots_needed %}
            {% set start_time = window[0].start.strftime('%Y-%m-%dT%H:%M:%S%z') %}
            {% set end_time = window[slots_needed - 1].end.strftime('%Y-%m-%dT%H:%M:%S%z') %}
            {% set slotted.tomorrow = slotted.tomorrow + [{'start': start_time, 'end': end_time, 'average': avg_price}] %}
          {% endfor %}

          {% set combined = {
            "today": slotted.today | sort(attribute='average'),
            "tomorrow": slotted.tomorrow | sort(attribute='average')
          } %}

          {{ combined | tojson }}

