# =============================================================================
# OpenHASP — Living Room Plate
#
# NOTE: Page 2 (radio — active), Page 3 (cameras — inactive) objects
# are commented out and currently inactive. They are kept for reference in case
# these features are re-enabled on the touch panel in the future.
# =============================================================================

living_room:
  objects:
    # =========================================================================
    # Page 1 — Home / Temperature & Lights
    # =========================================================================

    # Average house temperature
    - obj: "p1b5"
      properties:
        "text": "{{ states('sensor.average_house_temperature') }}°C"

    # Average downstairs temperature
    - obj: "p1b12"
      properties:
        "text": "{{ states('sensor.average_downstairs_temperature') }}°C"

    # Average upstairs temperature + play SLAM! on press
    - obj: "p1b17"
      properties:
        "text": "{{ states('sensor.average_upstairs_temperature') }}°C"

      # Change house heating target (inactive)
      # - obj: "p1b55"
      #   properties:
      #     "val": "{{ states('input_number.heating_daily_target') }}"
      #   event:
      #     "changed":
      #       - service: input_number.set_value
      #         data:
      #           entity_id: input_number.heating_daily_target
      #           value: "{{ val }}"
      #     "up":
      #       - service: input_number.set_value
      #         data:
      #           entity_id: input_number.heating_daily_target
      #           value: "{{ val }}"

      event:
        "down":
          - service: script.play_radio
            data:
              station: slam
              target_players: [media_player.living_room]

    # Heating target buttons (18 / 20 / 22 °C)
    - obj: "p1b68"
      event:
        "down":
          - service: script.set_daily_heating
            data:
              target_temp: 18
    - obj: "p1b55"
      properties:
        "border_side": "{{ 15 if states('input_number.heating_daily_target') == '18' else 0 }}"
        "border_color": "{{ '#00C853' if states('input_number.heating_daily_target') == '18' else '#2C2C2C' }}"
        "bg_color": "{{ '#1B3D1C' if states('input_number.heating_daily_target') == '18' else '#2C2C2C' }}"

    - obj: "p1b69"
      event:
        "down":
          - service: script.set_daily_heating
            data:
              target_temp: 20
    - obj: "p1b56"
      properties:
        "border_side": "{{ 15 if states('input_number.heating_daily_target') == '20' else 0 }}"
        "border_color": "{{ '#FF9100' if states('input_number.heating_daily_target') == '20' else '#2C2C2C' }}"
        "bg_color": "{{ '#3D2D1C' if states('input_number.heating_daily_target') == '20' else '#2C2C2C' }}"

    - obj: "p1b78"
      event:
        "down":
          - service: script.set_daily_heating
            data:
              target_temp: 22
    - obj: "p1b57"
      properties:
        "border_side": "{{ 15 if states('input_number.heating_daily_target') == '22' else 0 }}"
        "border_color": "{{ '#FF3D00' if states('input_number.heating_daily_target') == '22' else '#2C2C2C' }}"
        "bg_color": "{{ '#3D1C1C' if states('input_number.heating_daily_target') == '22' else '#2C2C2C' }}"

    # Current heating target display
    - obj: "p1b22"
      properties:
        "text": "{{ states('input_number.heating_daily_target') }}"

    # Auto TV Off toggle
    - obj: "p1b85"
      event:
        "down":
          - service: input_boolean.toggle
            entity_id: input_boolean.turn_off_tv_after_playing
    - obj: "p1b81"
      properties:
        "bg_color": '{{ "#253926" if is_state("input_boolean.turn_off_tv_after_playing", "on") else "#2C2C2C" }}'
    - obj: "p1b82"
      properties:
        "text_color": '{{ "#4caf50" if is_state("input_boolean.turn_off_tv_after_playing", "on") else "#6F6F6F" }}'
    - obj: "p1b84"
      properties:
        "text": '{{ "Aan" if is_state("input_boolean.turn_off_tv_after_playing", "on") else "Uit" }}'

    # Weather display
    - obj: "p1b87"
      properties:
        "text": >-
          {% set condition = states('weather.openweathermap') %}
          {% if condition == 'sunny' %}{{ "\uE599" }}
          {% elif condition == 'clear-night' %}{{ "\uE594" }}
          {% elif condition == 'cloudy' %}{{ "\uE590" }}
          {% elif condition == 'partlycloudy' %}{{ "\uE595" }}
          {% elif condition == 'rainy' %}{{ "\uE596" }}
          {% elif condition == 'snowy' %}{{ "\uE598" }}
          {% elif condition == 'lightning' %}{{ "\uE593" }}
          {% elif condition == 'fog' %}{{ "\uE591" }}
          {% elif condition == 'windy' %}{{ "\uE59D" }}
          {% else %}{{ "\uE590" }}{% endif %}
    - obj: "p1b88"
      properties:
        "text": "{{ state_attr('weather.openweathermap', 'temperature') | round(0) }}°C"
    - obj: "p1b89"
      properties:
        "text": >-
          {% set condition = states('weather.openweathermap') %}
          {% if condition == 'sunny' %}Zonnig
          {% elif condition == 'clear-night' %}Helder
          {% elif condition == 'cloudy' %}Bewolkt
          {% elif condition == 'partlycloudy' %}Half bew.
          {% elif condition == 'rainy' %}Regen
          {% elif condition == 'snowy' %}Sneeuw
          {% elif condition == 'lightning' %}Onweer
          {% elif condition == 'fog' %}Mist
          {% elif condition == 'windy' %}Wind
          {% else %}{{ condition }}{% endif %}

    # Television — Living room
    - obj: "p1b75"
      event:
        "down":
          - service: homeassistant.toggle
            entity_id: switch.living_room_television
    - obj: "p1b71"
      properties:
        "bg_color": '{{ "#253926" if is_state("switch.living_room_television", "on") else "#2C2C2C" }}'
    - obj: "p1b72"
      properties:
        "text": '{{ "\uE502" }}'
        "text_color": '{{ "#4caf50" if is_state("switch.living_room_television", "on") else "#6F6F6F" }}'
    - obj: "p1b74"
      properties:
        "text": '{{ "Aan" if is_state("switch.living_room_television", "on") else "Uit" }}'

