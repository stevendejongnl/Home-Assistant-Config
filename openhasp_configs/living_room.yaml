    # =========================================================================
    # Page 2 — Radio
    # Station buttons (p2b7–p2b12) trigger play_radio for both Volumio rooms.
    # Volume slider (p2b6) controls both rooms simultaneously.
    # Stop button (p2b25) stops both rooms.
    # Now-playing label (p2b30) shows current track from living room.
    # =========================================================================

    # Station buttons
    - obj: "p2b7"
      event:
        "down":
          - service: script.play_radio_qmusic

    - obj: "p2b8"
      event:
        "down":
          - service: script.play_radio_qmusic_nonstop

    - obj: "p2b9"
      event:
        "down":
          - service: script.play_radio_slam

    - obj: "p2b10"
      event:
        "down":
          - service: script.play_radio_slam_nonstop

    - obj: "p2b11"
      event:
        "down":
          - service: script.play_radio_538

    - obj: "p2b12"
      event:
        "down":
          - service: script.play_radio_538_nonstop

    # Volume slider — sets volume on both rooms simultaneously
    - obj: "p2b6"
      properties:
        "val": '{{ (state_attr("media_player.living_room", "volume_level") | float(0) * 100) | int }}'
      event:
        "up":
          - service: media_player.volume_set
            data:
              entity_id:
                - media_player.living_room
                - media_player.dining_room
              volume_level: "{{ val / 100 }}"

    # Stop button — stops both rooms
    - obj: "p2b25"
      event:
        "down":
          - service: media_player.media_stop
            data:
              entity_id:
                - media_player.living_room
                - media_player.dining_room

    # Now-playing label — shows current track title from living room
    - obj: "p2b30"
      properties:
        "text": '{{ state_attr("media_player.living_room", "media_title") or "" }}'
