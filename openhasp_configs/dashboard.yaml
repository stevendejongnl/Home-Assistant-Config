        "text_color": '{{ "#4caf50" if is_state("light.far_left", "on") else "#6F6F6F" }}'
    - obj: "p1b39"
      properties:
        "text": '{{ "On" if is_state("light.far_left", "on") else "Off" }}'

    # Attic Far Right Light toggle
