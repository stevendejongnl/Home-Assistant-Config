# =============================================================================
# OpenHASP — Dashboard (Attic) Plate
#
# NOTE: "Attic Something" (p1b57) is commented out and inactive.
# =============================================================================

dashboard:
  objects:
    # =========================================================================
    # Page 1 — Environmental Sensors & Light Controls
    # =========================================================================

    # Clock
    - obj: "p1b110"
      properties:
        "text": "{{ states('sensor.time') }}"

    # Attic CO2 reading
    - obj: "p1b5"
      properties:
        "text": "{{ '%.2f'|format(states('sensor.attic_air_quality_co2') | float) }} ppm"

    # CO2 gauge
    - obj: "p1b6"
      properties:
        "val": "{{ states('sensor.attic_air_quality_co2') | float | round(0) }}"
        "line_color10": "{{ states('sensor.attic_co2_gauge_color') }}"

    # Attic humidity
    - obj: "p1b12"
      properties:
        "text": "{{ '%.2f'|format(states('sensor.attic_air_quality_humidity') | float) }}%"

    # Attic temperature
    - obj: "p1b17"
      properties:
        "text": "{{ '%.2f'|format(states('sensor.attic_air_quality_temperature') | float) }}°C"

    # Attic Hue Light toggle
    - obj: "p1b55"
      event:
        "down":
          - service: homeassistant.toggle
            entity_id: light.hue
    - obj: "p1b21"
      properties:
        "bg_color": '{{ "#253926" if is_state("light.hue", "on") else "#2C2C2C" }}'
    - obj: "p1b22"
      properties:
        "text": '{{ "\uE6E8" if is_state("light.hue", "on") else "\uE335" }}'
        "text_color": '{{ "#4caf50" if is_state("light.hue", "on") else "#6F6F6F" }}'
    - obj: "p1b24"
      properties:
        "text": '{{ "On" if is_state("light.hue", "on") else "Off" }}'

    # Dashboard display keep-on toggle
    - obj: "p1b56"
      event:
        "down":
          - service: homeassistant.toggle
            entity_id: input_boolean.keep_dashboard_display_on
    - obj: "p1b26"
      properties:
        "bg_color": '{{ "#253926" if is_state("input_boolean.keep_dashboard_display_on", "on") else "#2C2C2C" }}'
    - obj: "p1b27"
      properties:
        "text_color": '{{ "#4caf50" if is_state("input_boolean.keep_dashboard_display_on", "on") else "#6F6F6F" }}'
    - obj: "p1b29"
      properties:
        "text": '{{ "On" if is_state("input_boolean.keep_dashboard_display_on", "on") else "Off" }}'

    # Attic Something (inactive)
    # - obj: "p1b57"
    #   event:
    #     "down":
    #       - service: homeassistant.toggle
    #         entity_id: light.far_left
    # - obj: "p1b31"
    #   properties:
    #     "bg_color": '{{ "#253926" if is_state("light.far_left", "on") else "#2C2C2C" }}'
    # - obj: "p1b32"
    #   properties:
    #     "text": '{{ "\uE156" if is_state("light.far_left", "on") else "\uE156" }}'
    #     "text_color": '{{ "#4caf50" if is_state("light.far_left", "on") else "#6F6F6F" }}'
    # - obj: "p1b34"
    #   properties:
    #     "text": '{{ "On" if is_state("light.far_left", "on") else "Off" }}'

    # Attic Far Left Light toggle
    - obj: "p1b58"
