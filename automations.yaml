- id: tv_distance_pause_resume
  alias: TV Distance - Pause/Resume Woonkamer
  description: Pause media when too close to TV, resume when moved back
  triggers:
  - trigger: state
    entity_id: binary_sensor.tv_distance_sensor_too_close_to_tv
    to: 'on'
    id: too_close
  - trigger: state
    entity_id: binary_sensor.tv_distance_sensor_too_close_to_tv
    to: 'off'
    id: far_enough
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: too_close
      sequence:
      - action: media_player.media_pause
        target:
          entity_id: media_player.woonkamer
    - conditions:
      - condition: trigger
        id: far_enough
      sequence:
      - action: media_player.media_play
        target:
          entity_id: media_player.woonkamer
  mode: single
