- id: '1737016029102'
  alias: Proxmox API Restart Frigate with Status Check
  description: ''
  triggers:
  - entity_id: input_button.proxmox_api_restart_frigate
    trigger: state
  conditions: []
  actions:
  - data:
      message: Restarting LXC
      title: Frigate issues
    action: notify.steven
  - response_variable: stop_response
    action: shell_command.proxmox_api_stop_frigate
    data: {}
  - repeat:
      while:
      - condition: template
        value_template: '{{ stop_response.stdout != ''"stopped"'' }}'
      sequence:
      - response_variable: stop_response
        action: shell_command.proxmox_api_status_frigate
        data: {}
      - delay: 00:00:05
  - response_variable: start_response
    action: shell_command.proxmox_api_start_frigate
    data: {}
  - repeat:
      while:
      - condition: template
        value_template: '{{ start_response.stdout != ''"running"'' }}'
      sequence:
      - response_variable: start_response
        action: shell_command.proxmox_api_status_frigate
        data: {}
      - delay: 00:00:05
  - data:
      message: Successfully restarted
      title: Frigate issues
    action: notify.steven
  mode: single
