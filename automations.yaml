- id: '1761932346081'
  alias: Halloween mode lights
  description: 'Alternating random flicker effect for front door light, doorbell LED,
    and two garden path lights, only on Halloween night

    '
  triggers:
  - trigger: time_pattern
    seconds: /4
  conditions:
  - condition: template
    value_template: "{{ now().month == 10 and now().day == 31 and\n   now().hour >=
      18 and now().hour < 23 }}\n"
    enabled: true
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ range(0, 10) | random < 4 }}'
      sequence:
      - variables:
          active_entity: "{{\n  [\n    'light.front_door',\n    'select.front_door_doorbell_led',\n
            \   'light.front_garden_path_light_street_side',\n    'light.front_garden_path_light_street_side'\n
            \ ] | random\n}}\n"
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ active_entity == ''light.front_door'' }}'
          sequence:
          - repeat:
              count: '{{ range(2, 5) | random }}'
              sequence:
              - action: light.turn_off
                target:
                  entity_id: light.front_door
              - delay:
                  milliseconds: '{{ range(100, 400) | random }}'
              - action: light.turn_on
                target:
                  entity_id: light.front_door
              - delay:
                  milliseconds: '{{ range(100, 600) | random }}'
        - conditions:
          - condition: template
            value_template: '{{ active_entity == ''select.front_door_doorbell_led''
              }}'
          sequence:
          - repeat:
              count: '{{ range(2, 4) | random }}'
              sequence:
              - action: select.select_option
                target:
                  entity_id: select.front_door_doorbell_led
                data:
                  option: stayoff
              - delay:
                  milliseconds: '{{ range(150, 500) | random }}'
              - action: select.select_option
                target:
                  entity_id: select.front_door_doorbell_led
                data:
                  option: alwaysonatnight
              - delay:
                  milliseconds: '{{ range(200, 700) | random }}'
        - conditions:
          - condition: template
            value_template: "{{ active_entity ==\n   'light.front_garden_path_light_street_side'
              }}\n"
          sequence:
          - repeat:
              count: '{{ range(2, 6) | random }}'
              sequence:
              - action: light.turn_off
                target:
                  entity_id: light.front_garden_path_light_street_side
              - delay:
                  milliseconds: '{{ range(80, 350) | random }}'
              - action: light.turn_on
                target:
                  entity_id: light.front_garden_path_light_street_side
              - delay:
                  milliseconds: '{{ range(100, 500) | random }}'
        - conditions:
          - condition: template
            value_template: "{{ active_entity ==\n   'light.front_garden_path_light_street_side'
              }}\n"
          sequence:
          - repeat:
              count: '{{ range(3, 7) | random }}'
              sequence:
              - action: light.turn_off
                target:
                  entity_id: light.front_garden_path_light_street_side
              - delay:
                  milliseconds: '{{ range(120, 400) | random }}'
              - action: light.turn_on
                target:
                  entity_id: light.front_garden_path_light_street_side
              - delay:
                  milliseconds: '{{ range(150, 550) | random }}'
  mode: restart
- id: '1762432379581'
  alias: Heating daily
  description: ''
  triggers:
  - entity_id:
    - sensor.active_heating_schedule
    to: Daily
    trigger: state
  conditions: []
  actions:
  - target:
      entity_id:
      - climate.thermostat
      - climate.all_radiators
    action: climate.turn_on
  - variables:
      target_temp: '{{ states(''input_number.heating_daily_target'') | float(0) }}'
      radiators: "{{ state_attr('group.all_radiators', 'entity_id')\n   if state_attr('group.all_radiators',
        'entity_id') is not none\n   else (state_attr('climate.all_radiators', 'entity_id')\n
        \        if state_attr('climate.all_radiators', 'entity_id') is not none\n
        \        else []) }}"
  - repeat:
      for_each: '{{ radiators }}'
      sequence:
      - variables:
          radiator_id: '{{ repeat.item }}'
          room_name: '{{ radiator_id.split(''.trv_better_'')[1] if ''.trv_better_''
            in radiator_id else radiator_id }}'
          keep_open_boolean: input_boolean.trv_{{ room_name }}_keep_open
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ not is_state(keep_open_boolean, ''on'') }}'
          sequence:
          - target:
              entity_id: '{{ radiator_id }}'
            data:
              temperature: '{{ target_temp }}'
            action: climate.set_temperature
        - conditions:
          - condition: template
            value_template: '{{ is_state(keep_open_boolean, ''on'') }}'
          sequence: []
  - target:
      entity_id: climate.thermostat
    data:
      temperature: '{{ target_temp }}'
    action: climate.set_temperature
  - if:
    - condition: state
      entity_id: input_boolean.holiday_mode
      state:
      - 'off'
    then:
    - data:
        value: 16
      target:
        entity_id: input_number.heating_nightly_target
      action: input_number.set_value
  mode: single
- id: '1762432547675'
  alias: Heating nightly
