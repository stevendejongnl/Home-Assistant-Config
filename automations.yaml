        entity_id: input_boolean.holiday_mode
        state:
        - 'on'
      sequence:
      - target:
          entity_id: light.ambient_lights
        action: light.turn_off
      - variables:
          chosen_light: '{{ state_attr(''light.ambient_lights'', ''entity_id'') |
            random }}

