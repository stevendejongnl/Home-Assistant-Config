- id: '1737892727086'
  alias: Turn on ambient lights with combined lux
  triggers:
  - value_template: '{% set front = states(''sensor.light_sensor_front_garden_illuminance'')
      | float(0) %} {% set back = states(''sensor.light_sensor_back_garden_illuminance'')
      | float(0) %} {% set living = states(''sensor.light_sensor_living_room_illuminance'')
      | float(0) %} {{ ((front + back + living) / 3) < 100 }}

      '
    trigger: template
    for:
      hours: 0
      minutes: 5
      seconds: 0
  - trigger: sun
    event: sunrise
    offset: -00:30
  conditions:
  - condition: or
    conditions:
    - condition: time
      after: 06:00:00
    - condition: sun
      after: sunrise
      after_offset: -00:30
