    action: notify.steven
    enabled: false
  - target:
      entity_id:
      - climate.thermostat
      - climate.all_radiators
    action: climate.turn_on
  - variables:
      target_temp: '{{ states(''input_number.heating_nightly_target'') | float(0)
        }}'
      radiators: "{{ state_attr('group.all_radiators', 'entity_id')\n   if state_attr('group.all_radiators',
        'entity_id') is not none\n   else (state_attr('climate.all_radiators', 'entity_id')\n
        \        if state_attr('climate.all_radiators', 'entity_id') is not none\n
        \        else []) }}"
  - repeat:
      for_each: '{{ radiators }}'
      sequence:
      - variables:
          radiator_id: '{{ repeat.item }}'
          room_name: '{{ radiator_id.split(''.trv_better_'')[1] if ''.trv_better_''
            in radiator_id else radiator_id }}'
          keep_open_boolean: input_boolean.trv_{{ room_name }}_keep_open
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ not is_state(keep_open_boolean, ''on'') }}'
          sequence:
          - target:
              entity_id: '{{ radiator_id }}'
            data:
              temperature: '{{ target_temp }}'
            action: climate.set_temperature
        - conditions:
          - condition: template
            value_template: '{{ is_state(keep_open_boolean, ''on'') }}'
          sequence: []
  - target:
