- id: '1734598089760'
  alias: Check Plant Moisture Levels
  description: Check if plants need watering and send a notification if moisture is
    critically low
  triggers:
  - trigger: time
    at: '10:00:00'
  - trigger: time
    at: '20:00:00'
  actions:
  - variables:
      plant_count: '{{ states.sensor | selectattr(''entity_id'', ''match'', ''sensor\.plant\_.+_soil_moisture'')
        | list | length }}'
  - repeat:
      count: '{{ plant_count }}'
      sequence:
      - variables:
          plant: '{% for plant in states.sensor | selectattr(''entity_id'', ''match'',
            ''sensor\.plant\_.+_soil_moisture'') | list %}{% if loop.index == repeat.index
            %}{{plant.entity_id | replace(''sensor.plant_'', ''plant.'')  | replace(''_soil_moisture'',
            '''') }}{% endif %}{% endfor %}'
          plant_id: '{% for plant in states.sensor | selectattr(''entity_id'', ''match'',
            ''sensor\.plant\_.+_soil_moisture'') | list %}{% if loop.index == repeat.index
            %}{{plant.entity_id | replace(''sensor.plant_'', '''')  | replace(''_soil_moisture'',
            '''') }}{% endif %}{% endfor %}'
          plant_sensor: '{% for plant in states.sensor | selectattr(''entity_id'',
            ''match'', ''sensor\.plant\_.+_soil_moisture'') | list %}{% if loop.index
            == repeat.index %}{{plant.entity_id}}{% endif %}{% endfor %}'
          plant_name: '{{ state_attr(plant, ''friendly_name'') }}'
          plant_picture: '{{ state_attr(plant, ''entity_picture'') }}'
          soil_moisture_sensor: '{{ plant_sensor }}'
          last_seen_sensor: '{{ soil_moisture_sensor | replace(''_soil_moisture'',
            ''_last_seen'') }}'
          min_soil_moisture: number.{{ plant_id }}_min_soil_moisture
          current_moisture: '{{ states(soil_moisture_sensor) | float(0) }}'
          min_moisture: '{{ states(min_soil_moisture) | float(0) }}'
          last_seen_state: '{{ states(last_seen_sensor) }}'
          sensor_active: '{{ last_seen_state and last_seen_state not in [''unavailable'',
            ''unknown'', ''None''] }}'
          hours_since_last_seen: "{% if sensor_active %}\n  {% set ts = (last_seen_state
            | as_datetime).timestamp() %}\n  {{ ((now().timestamp() - ts) / 3600)
            | int }}\n{% else %}\n  999\n{% endif %}"
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ current_moisture < min_moisture and sensor_active
              and hours_since_last_seen < 2 }}'
          sequence:
          - action: notify.steven
            data:
              title: '{{ plant_name }}'
              message: WATER!!!
              data:
                image: https://ha.madebysteven.nl{{ plant_picture }}
        - conditions:
          - condition: template
            value_template: '{{ current_moisture < min_moisture and (not sensor_active
              or hours_since_last_seen >= 2) }}'
          sequence:
          - action: notify.steven
            data:
              title: '{{ plant_name }} - Battery Low?'
              message: Sensor not reporting. Check battery!
              data:
                image: https://ha.madebysteven.nl{{ plant_picture }}
- id: '1734699987535'
  alias: Back garden house event detection
  description: ''
  triggers:
  - trigger: mqtt
    topic: frigate/events
    id: frigate-event
    payload: back_garden_house
    value_template: '{{ value_json[''after''][''camera''] }}'
    variables:
      after_zones: '{{ trigger.payload_json[''after''][''entered_zones''] }}'
      before_zones: '{{ trigger.payload_json[''before''][''entered_zones''] }}'
      camera: '{{ trigger.payload_json[''after''][''camera''] }}'
      id: '{{ trigger.payload_json[''after''][''id''] }}'
      label: '{{ trigger.payload_json[''after''][''label''] }}'
      score: '{{ trigger.payload_json[''after''][''score''] }}'
      time_clip_start: '{{ trigger.payload_json[''after''][''start_time''] - 10.0
        }}'
    enabled: true
  conditions:
  - condition: or
    conditions:
    - condition: template
      value_template: '{{ trigger.payload_json[''type''] == ''new'' }}'
      enabled: true
    - condition: template
      value_template: '{{ before_zones | length == 0 }}'
      enabled: true
    enabled: true
  - condition: template
    value_template: '{{ after_zones[0] == "Back_Garden_House" }}'
    enabled: true
  - condition: or
    conditions:
    - condition: state
      state: 'off'
      entity_id: input_boolean.back_motion_mute
    - condition: state
      state: unknown
      entity_id: input_boolean.back_motion_mute
    - condition: state
      entity_id: input_boolean.back_motion_mute
      state: unavailable
  - condition: state
    state: 'off'
    entity_id: input_boolean.back_motion_cooldown
  - condition: and
    conditions:
    - condition: template
      value_template: '{{ not is_state(''device_tracker.iphone_steven_bluetooth_bermuda_tracker'',
        ''home'') }}'
    - condition: time
      after: '20:00:00'
      before: 09:00:00
  actions:
  - event: BACK_MOTION_COOLDOWN
    event_data: {}
  - alias: Set up variables for the actions
    variables:
      action_mute_15: '{{ "MUTE_15_" ~ context.id }}'
      action_mute_60: '{{ "MUTE_60_" ~ context.id }}'
      action_mute_360: '{{ "MUTE_360_" ~ context.id }}'
      action_mute_720: '{{ "MUTE_720_" ~ context.id }}'
  - alias: Download snapshot
    action: shell_command.download_snapshot
    data:
      id: '{{ trigger.payload_json[''after''][''id''] }}'
    response_variable: download_response
  - data:
      title: Back garden house camera
      message: '{{ label | title }} detected'
      data:
        tag: '{{ id }}'
        group: back-garden-houde
        image: https://ha.madebysteven.nl/local/snapshots/{{ trigger.payload_json['after']['id']
          }}.jpg
        actions:
        - action: '{{action_mute_15}}'
          title: Mute for 15 minutes
        - action: '{{action_mute_60}}'
          title: Mute for 1 hour
        - action: '{{action_mute_360}}'
          title: Mute for 6 hours
        - action: '{{action_mute_720}}'
          title: Mute for 12 hours
    action: notify.security
    enabled: true
  - alias: Wait for a response
    timeout: 00:01:00
    continue_on_timeout: false
    wait_for_trigger:
    - event_type: mobile_app_notification_action
      event_data:
        action: '{{ action_mute_15 }}'
      trigger: event
    - event_type: mobile_app_notification_action
      event_data:
        action: '{{ action_mute_60 }}'
      trigger: event
    - event_type: mobile_app_notification_action
      event_data:
        action: '{{ action_mute_360 }}'
      trigger: event
    - event_type: mobile_app_notification_action
      event_data:
        action: '{{ action_mute_720 }}'
      trigger: event
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ wait.trigger.event.data.action == action_mute_15 }}'
      sequence:
      - event: BACK_MOTION_MUTE
        event_data:
          minutes: 15
    - conditions:
      - condition: template
        value_template: '{{ wait.trigger.event.data.action == action_mute_60 }}'
      sequence:
      - event: BACK_MOTION_MUTE
        event_data:
          minutes: 60
    - conditions:
      - condition: template
        value_template: '{{ wait.trigger.event.data.action == action_mute_360 }}'
      sequence:
      - event: BACK_MOTION_MUTE
        event_data:
          minutes: 360
    - conditions:
      - condition: template
        value_template: '{{ wait.trigger.event.data.action == action_mute_720 }}'
      sequence:
      - event: BACK_MOTION_MUTE
        event_data:
          minutes: 720
    default:
    - event: BACK_MOTION_MUTE
      event_data:
        minutes: 0
  trace:
    stored_traces: 50
  mode: single
