    variables:
      after_zones: '{{ trigger.payload_json[''after''][''entered_zones''] }}'
      before_zones: '{{ trigger.payload_json[''before''][''entered_zones''] }}'
      camera: '{{ trigger.payload_json[''after''][''camera''] }}'
      id: '{{ trigger.payload_json[''after''][''id''] }}'
      label: '{{ trigger.payload_json[''after''][''label''] }}'
      score: '{{ trigger.payload_json[''after''][''score''] }}'
      time_clip_start: '{{ trigger.payload_json[''after''][''start_time''] - 10.0
        }}'
    enabled: true
  conditions:
  - condition: or
    conditions:
    - condition: template
      value_template: '{{ trigger.payload_json[''type''] == ''new'' }}'
      enabled: true
    - condition: template
      value_template: '{{ before_zones | length == 0 }}'
      enabled: true
    enabled: true
  - condition: state
    state: 'off'
    entity_id: input_boolean.front_motion_cooldown
  actions:
  - alias: Download snapshot
    action: shell_command.download_snapshot
    data:
      id: '{{ trigger.payload_json[''after''][''id''] }}'
    response_variable: download_response
  mode: single
  trace:
    stored_traces: 50
