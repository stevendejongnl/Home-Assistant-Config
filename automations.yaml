  triggers:
  - minutes: 0
    trigger: time_pattern
  conditions: []
  actions:
  - variables:
      max_open_temp: 35
      radiators: "{{ state_attr('climate.all_radiators', 'entity_id')\n   if state_attr('climate.all_radiators',
        'entity_id') is not none\n   else (state_attr('group.all_radiators', 'entity_id')\n
        \        if state_attr('group.all_radiators', 'entity_id') is not none\n         else
        []) }}"
  - repeat:
      for_each: '{{ radiators }}'
      sequence:
      - variables:
          radiator_id: '{{ repeat.item }}'
          base_name: '{{ radiator_id.split(''.'')[1] if ''.'' in radiator_id else
            radiator_id }}'
          room_base: '{{ base_name.replace(''trv_better_'', '''') }}'
          room_option1: '{{ room_base.replace(''living_'', ''living_room_'') }}'
          room_option2: '{{ room_base }}'
          boolean1: input_boolean.trv_{{ room_option1 }}_keep_open
          boolean2: input_boolean.trv_{{ room_option2 }}_keep_open
          candidate_trv1: climate.trv_{{ room_option1 }}
          candidate_trv2: climate.trv_{{ room_option2 }}
          candidate_trv3: '{{ radiator_id.replace(''trv_better'', ''trv'') }}'
          trv_to_set: "{{ candidate_trv1 if states(candidate_trv1) != 'unknown'\n
            \  else (candidate_trv2 if states(candidate_trv2) != 'unknown'\n         else
            candidate_trv3) }}"
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ is_state(boolean1, ''on'') or is_state(boolean2, ''on'')
              }}'
          sequence:
          - target:
              entity_id: '{{ trv_to_set }}'
            data:
              temperature: '{{ max_open_temp }}'
            action: climate.set_temperature
          - data:
              title: TRV opened by automation
              message: '{{ trv_to_set }} set to {{ max_open_temp }}° because {{ boolean1
                }} or {{ boolean2 }} is on.'
            action: notify.steven
            enabled: false
  mode: single
- id: '1762434540811'
  alias: Sync TRV calibrations every 15 minutes
  description: Every 15 minutes compare each TRV's reported temperature with the room
    temperature sensor and update the corresponding local temperature calibration
    number so the TRV reading matches the room sensor. Values are clamped to the valid
    range of the number entity (-9.0 ..  9.0) to avoid "value out of range" errors.
  triggers:
  - minutes: /15
    trigger: time_pattern
  conditions: []
  actions:
  - repeat:
      for_each: '{{ mappings }}'
      sequence:
      - variables:
          trv_entity: '{{ repeat.item.trv }}'
          room_sensor: '{{ repeat.item.sensor }}'
          calibration_entity: '{{ repeat.item.calibration }}'
          open_entity: '{{ repeat.item.open }}'
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ state_attr(trv_entity, 'current_temperature') is not
              none\n   and not is_state(room_sensor, 'unknown')\n   and not is_state(room_sensor,
              'unavailable')\n   and states(room_sensor) != '' }}"
          sequence:
          - variables:
              room_temp: '{{ states(room_sensor) | float(0) }}'
              trv_temp: '{{ state_attr(trv_entity, ''current_temperature'') | float(0)
                }}'
              current_cal: '{{ states(calibration_entity) | float(0) }}'
              raw_new_cal: '{{ (room_temp - trv_temp) | round(1) }}'
              new_cal_clamped: '{{ [ -9.0, [ ((room_temp - trv_temp) | round(1)),
                9.0 ] | min ] | max }}'
          - choose:
            - conditions:
              - condition: and
                conditions:
                - condition: template
                  value_template: '{{ (((room_temp - trv_temp) | round(1) - current_cal)
                    | abs) > 0.1 }}'
                - condition: template
                  value_template: '{{ states(open_entity) == ''off'' }}'
              sequence:
              - target:
                  entity_id: '{{ calibration_entity }}'
                data:
                  value: '{{ new_cal_clamped }}'
                action: number.set_value
              - data:
                  title: TRV calibration updated
                  message: '{{ calibration_entity }} set to {{ new_cal_clamped }}°.
                    Raw required calibration was {{ raw_new_cal }}°.  {{ ''Value was
                    clamped to allowed range (-9..9).'' if (raw_new_cal != new_cal_clamped)
                    else '''' }} (room {{ room_sensor }}={{ room_temp }}°, trv {{
                    trv_entity }}={{ trv_temp }}°, old cal={{ current_cal }}°)'
                action: notify.steven
                enabled: false
        - conditions: []
          sequence:
          - variables:
              hours_since_last_update: "{% set last_changed = state_attr(trv_entity,
                'last_changed') %} {% if last_changed %}\n  {{ ((as_timestamp(now())
                - as_timestamp(last_changed)) / 3600) | round(1) }}\n{% else %}\n
                \ 999\n{% endif %}"
          - condition: template
            value_template: '{{ hours_since_last_update >= 6 }}'
          - data:
              title: TRV calibration - missing data
              message: Cannot read {{ repeat.item.trv }} current_temperature or {{
                repeat.item.sensor }}. TRV current_temperature or room sensor is missing/unavailable.
            action: notify.steven
            enabled: false
  variables:
    mappings:
    - trv: climate.trv_living_room_front
      sensor: sensor.living_room_front_temperature
      calibration: number.trv_living_room_front_local_temperature_calibration
      open: input_boolean.trv_living_room_front_keep_open
    - trv: climate.trv_living_room_back
      sensor: sensor.living_room_back_temperature
      calibration: number.trv_living_room_back_local_temperature_calibration
      open: input_boolean.trv_living_room_back_keep_open
    - trv: climate.trv_dining_room
      sensor: sensor.dining_room_temperature
      calibration: number.trv_dining_room_local_temperature_calibration
      open: input_boolean.trv_dining_room_keep_open
    - trv: climate.trv_bedroom
      sensor: sensor.bedroom_temperature
      calibration: number.trv_bedroom_local_temperature_calibration
      open: input_boolean.trv_bedroom_keep_open
    - trv: climate.trv_bedroom_scott
      sensor: sensor.bedroom_scott_temperature
      calibration: number.trv_bedroom_scott_local_temperature_calibration
      open: input_boolean.trv_bedroom_scott_keep_open
    - trv: climate.trv_bedroom_marlou
      sensor: sensor.bedroom_marlou_temperature
      calibration: number.trv_bedroom_marlou_local_temperature_calibration
      open: input_boolean.trv_bedroom_marlou_keep_open
  mode: single
