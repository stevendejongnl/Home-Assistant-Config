esphome:
  name: tv_distance_sensor
  friendly_name: TV Distance Sensor
  min_version: 2025.11.0
  name_add_mac_suffix: false

esp8266:
  board: d1_mini

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  min_auth_mode: WPA2
  use_address: 192.168.1.136

captive_portal:


# ---------------- I2C ----------------
i2c:
  sda: D2
  scl: D1
  frequency: 400kHz
  scan: true

# ---------------- Adjustable Parameters ----------------
number:
  - platform: template
    name: "TV Distance Threshold"
    id: distance_threshold
    optimistic: true
    min_value: 0.30
    max_value: 2.00
    step: 0.01
    initial_value: 0.80
    unit_of_measurement: "m"

  - platform: template
    name: "TV Distance Hysteresis"
    id: distance_hysteresis
    optimistic: true
    min_value: 0.01
    max_value: 0.50
    step: 0.01
    initial_value: 0.10
    unit_of_measurement: "m"

# ---------------- Distance Sensor ----------------
external_components:
  - source: github://stevendejongnl/esphome-vl53l1x
    components: [tof_vl53l1x]

sensor:
  - platform: tof_vl53l1x
    name: "TV Distance"
    id: tv_distance
    update_interval: 300ms
    filters:
      - filter_out: 0.0
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1


# ---------------- Smart Hysteresis Logic ----------------
binary_sensor:
  - platform: template
    name: "Too Close To TV"
    id: too_close
    device_class: safety
    lambda: |-
      const float threshold = id(distance_threshold).state;
      const float hysteresis = id(distance_hysteresis).state;
      const float distance = id(tv_distance).state;

      if (isnan(distance)) return false;

      if (id(too_close).state) {
        return distance < (threshold + hysteresis);
      } else {
        return distance < threshold;
      }

    filters:
      - delayed_on: 2s
      - delayed_off: 5s
