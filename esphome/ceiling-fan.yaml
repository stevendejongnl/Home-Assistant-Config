esphome:
  name: ceiling-fan
  friendly_name: Ceiling Fan

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret ota_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  use_address: 192.168.1.158
  output_power: 20dB

remote_receiver:
  pin:
    number: GPIO4
    inverted: true
  tolerance: 25%
  on_raw:
    then:
      - if:
          condition:
            lambda: 'return x.size() > 10;'
          then:
            - remote_transmitter.transmit_raw:
                carrier_frequency: 0Hz
                code: !lambda 'return x;'

remote_transmitter:
  pin:
    number: GPIO3
    mode:
      output: true
    inverted: true
  carrier_duty_percent: 50%
  non_blocking: true

switch:
  - platform: template
    name: Light
    icon: mdi:lightbulb
    optimistic: true
    turn_on_action:
      - button.press: light_on_btn
    turn_off_action:
      - button.press: light_off_btn

  - platform: template
    name: Fan
    icon: mdi:fan
    optimistic: true
    turn_on_action:
      - button.press: fan_speed_down_btn
    turn_off_action:
      - button.press: fan_stop_btn

  - platform: template
    name: Fan Direction
    icon: mdi:rotate-3d-variant
    optimistic: true
    turn_on_action:
      - button.press: reverse_forward_btn  # each press toggles direction
    turn_off_action:
      - button.press: reverse_forward_btn

