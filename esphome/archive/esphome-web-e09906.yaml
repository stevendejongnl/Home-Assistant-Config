esphome:
  name: wifi_health_monitor
  platform: ESP8266
  board: nodemcuv2

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

sensor:
  - platform: wifi_signal
    name: "WiFi Signal Strength"
    update_interval: 60s

binary_sensor:
  - platform: status
    name: "WiFi Connection Status"

web_server:
  port: 80

external_components:
  - source:
      type: git
      url: https://github.com/dancol90/ESP8266Ping

interval:
  - interval: 60s
    then:
      - lambda: |-
          if (ping("1.1.1.1")) {  // CloudFlare DNS server
            ESP_LOGI("Ping Test", "Ping successful!");
          } else {
            ESP_LOGW("Ping Test", "Ping failed!");
          }

logger:

mqtt:
  broker: "192.168.1.5"  # Vervang met jouw MQTT-broker IP
  username: "stevendejong"
  password: "8JZm8U8pkW9N"
  topic_prefix: "esp8266/wifi_health"

ota:
  platform: esphome
