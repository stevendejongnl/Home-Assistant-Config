# =============================================================================
# Core Settings
# Fundamental HA configuration: default integrations, customizations, networking, logging
# =============================================================================

default_config:

homeassistant:
  customize: !include customize.yaml
  allowlist_external_dirs:
    - /config/www/snapshots
    - /config/openhasp/

http:
  use_x_forwarded_for: true
  trusted_proxies: !secret http_trusted_proxies

logger:
  default: info
  logs:
    custom_components.openhasp: debug
    custom_components.robovac.vacuum: debug
    custom_components.robovac.tuyalocalapi: debug
    custom_components.robovac_mqtt: debug
    custom_components.tuya_local: debug

# =============================================================================
# Integrations
# External services and scripting engines
# =============================================================================

# =============================================================================
# UI & Frontend
# Themes, custom panels, and OpenHASP touch-screen plates
# =============================================================================

frontend:
  themes: !include_dir_merge_named themes
openhasp: !include_dir_merge_named openhasp_configs/
panel_custom: !include panel_custom.yaml

# =============================================================================
# Automation & Scripts
# Automations, scripts, shell commands, templates, and sensors
# =============================================================================

automation old: !include automations.yaml
automation: !include_dir_merge_list automations/
script: !include scripts.yaml
sensor: !include_dir_merge_list sensors/
shell_command: !include shell_command.yaml
template: !include_dir_merge_list templates/

# =============================================================================
# Input Helpers
# UI-configurable state holders used by automations and dashboards
# =============================================================================

input_boolean: !include input_boolean.yaml
input_button: !include input_button.yaml
input_datetime: !include input_datetime.yaml
input_number: !include input_number.yaml

# =============================================================================
# SmartThings API
# Token reader + REST commands for direct SmartThings API access.
# The access_token is read from HA's own OAuth storage (auto-refreshed by HA).
# Note: samsungce.timeSync is not exposed on this oven; time sync uses the
# OCF execute capability — verify path with Samsung support if it fails.
# =============================================================================

command_line:
  - sensor:
      name: smartthings_access_token
      unique_id: smartthings_access_token
      command: >
        python3 -c "import json; d=json.load(open('/config/.storage/core.config_entries'));
        entries=d['data']['entries'];
        t=[e['data']['token']['access_token'] for e in entries if e.get('domain')=='smartthings'];
        print(t[0] if t else '')"
      scan_interval: 3600

rest_command:
  oven_sync_time:
    url: "https://api.smartthings.com/v1/devices/d7182718-47a4-ae9b-4187-9d64f021ecd3/commands"
    method: POST
    headers:
      Authorization: "Bearer {{ states('sensor.smartthings_access_token') }}"
      Content-Type: "application/json"
    payload: >-
      {"commands": [{"component": "main", "capability": "execute", "command": "execute",
      "arguments": ["/x.com.samsung.da.operatetimesync/0",
      {"x.com.samsung.da.operatetimesync": {"x.com.samsung.da.time":
      "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"}}]}]}

  # --- Proxmox API: Zigbee2MQTT (CT 100) ---
  proxmox_status_z2m:
    url: !secret proxmox_api_url_z2m_status
    method: GET
    headers:
      Authorization: !secret proxmox_api_token
    verify_ssl: false
  proxmox_stop_z2m:
    url: !secret proxmox_api_url_z2m_stop
    method: POST
    headers:
      Authorization: !secret proxmox_api_token
    verify_ssl: false
  proxmox_start_z2m:
    url: !secret proxmox_api_url_z2m_start
    method: POST
    headers:
      Authorization: !secret proxmox_api_token
    verify_ssl: false

  # --- Proxmox API: MQTT Broker (CT 121) ---
  proxmox_status_mqtt:
    url: !secret proxmox_api_url_mqtt_status
    method: GET
    headers:
      Authorization: !secret proxmox_api_token
    verify_ssl: false
  proxmox_stop_mqtt:
    url: !secret proxmox_api_url_mqtt_stop
    method: POST
    headers:
      Authorization: !secret proxmox_api_token
    verify_ssl: false
  proxmox_start_mqtt:
    url: !secret proxmox_api_url_mqtt_start
    method: POST
    headers:
      Authorization: !secret proxmox_api_token
    verify_ssl: false

# =============================================================================
# Devices & Services
# Climate control, Apple HomeKit bridge, and notifications
# =============================================================================

climate: !include climate.yaml
homekit: !include homekit.yaml
notify: !include notify.yaml

# =============================================================================
# Recorder
# PostgreSQL for short-term state history (long-term in InfluxDB)
# =============================================================================

recorder:
  db_url: !secret ha_db_url
  purge_keep_days: 30
  exclude:
    domains:
      - weather
      - media_player
      - update

