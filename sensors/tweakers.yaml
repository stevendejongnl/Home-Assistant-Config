# =============================================================================
# Tweakers Pricewatch Sensors
# Fetches current lowest prices from Tweakers.net pricewatch via REST API.
# Reference: https://github.com/tychobrouwer/tweakers-pricewatch
# =============================================================================

# TP-Link TL-SG108 — 8-port Gigabit network switch
- platform: rest
  unique_id: tweakers_tp_link_tl_sg108_switch_price_data
  name: Tweakers TP-Link TL-SG108 switch price data
  resource: https://tweakers.net/ajax/price_chart/327758/nl/
  method: GET
  scan_interval: 3600
  value_template: "{{ value_json.dataset.source[-1][1] }}"
  json_attributes:
    - dataset

